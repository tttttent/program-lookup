<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Program Requirements Lookup</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Program Requirements Lookup</h1>

      <div class="controls">
        <label>Major
          <input id="major_input" list="major_list" placeholder="Start typing to search...">
          <datalist id="major_list"></datalist>
        </label>

        <label>Minor
          <input id="minor_input" list="minor_list" placeholder="Start typing to search...">
          <datalist id="minor_list"></datalist>
        </label>

        <label>Concentration
          <input id="con_input" list="con_list" placeholder="Start typing to search...">
          <datalist id="con_list"></datalist>
        </label>

        <div class="buttons">
          <button id="search_btn">Search</button>
          <button id="clear_btn">Clear</button>
        </div>
      </div>

      <section id="result">
        <h2>Details</h2>
        <table id="details">
          <tbody></tbody>
        </table>
      </section>

      <p class="hint">Tip: open this folder in VS Code and launch a simple HTTP server (or open <code>index.html</code> directly).</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
